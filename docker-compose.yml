services:

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - auth
      - content
    restart: unless-stopped
    networks:
      - app

  db-auth:
    image: postgres:15-alpine
    container_name: db-auth
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_HOST_AUTH_METHODS: trust
    env_file:
      - ./auth-service/environment/.env
    volumes:
      - pgdata-auth:/var/lib/postgresql/data
    networks:
      - app
  
  db-content:
    image: postgres:15-alpine
    container_name: db-content
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_HOST_AUTH_METHODS: trust
    env_file:
      - ./content-service/environment/.env
    volumes:
      - pgdata-content:/var/lib/postgresql/data
    networks:
      - app

  auth:
    container_name: "auth"
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    restart: unless-stopped
    command: uv run uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8001:8000"
    env_file:
      - ./auth-service/environment/.env
    depends_on:
      - db-auth
    volumes:
      - ./auth-service:/code
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      - app
    
  content:
    container_name: "content"
    build:
      context: ./content-service
      dockerfile: Dockerfile
    restart: unless-stopped
    command: uv run uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8002:8000"
    env_file:
      - ./content-service/environment/.env
    depends_on:
      - db-content
    volumes:
      - ./content-service:/code
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      - app

volumes:
  pgdata-auth:
  pgdata-content:

networks:
  app: